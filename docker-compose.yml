services:
  app:
    image: ${DOCKERHUB_USER:-hananenahim}/devops-tp5:latest
    container_name: devops-tp5-app

    ports:
      - "8080:3000"

    environment:
      - PORT=3000
      - APP_VERSION=${APP_VERSION:-latest}
      - BUILD_NUMBER=${BUILD_NUMBER:-local}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
